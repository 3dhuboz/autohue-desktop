name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build, package & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $src = "dist/AutoHue Setup $version.exe"
          if (Test-Path $src) {
            npx wrangler r2 object put "autohue-releases/AutoHue-Setup-$version.exe" --file "$src"
            Write-Host "Uploaded AutoHue-Setup-$version.exe to R2"
          } else {
            Write-Host "WARNING: $src not found, skipping R2 upload"
            Get-ChildItem dist/*.exe | ForEach-Object { Write-Host "  Found: $($_.Name)" }
          }
        shell: pwsh

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build, package & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload DMG to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DMG=$(find dist -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            npx wrangler r2 object put "autohue-releases/AutoHue-${VERSION}.dmg" --file "$DMG"
            echo "Uploaded AutoHue-${VERSION}.dmg to R2"
          else
            echo "WARNING: No .dmg found, skipping R2 upload"
            ls -la dist/ || true
          fi

  publish:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release edit "$TAG" --draft=false --latest --repo "$GITHUB_REPOSITORY"
