appId: com.autohue.desktop
productName: AutoHue
copyright: Copyright 2026
directories:
  output: dist
  buildResources: build
files:
  - electron/**/*
  - worker/**/*
  - renderer/dist/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,LICENSE}"
  - "!**/node_modules/.cache"
  - "!worker/models/**"
extraResources:
  - from: worker/models/
    to: models/
    filter:
      - "**/*"
asarUnpack:
  - "**/node_modules/onnxruntime-node/**"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/node-unrar-js/**"
  - "**/node_modules/sharp/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: AutoHue-Setup-${version}.exe
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  installerIcon: build/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.photography
publish:
  provider: github
  owner: 3dhuboz
  repo: autohue-desktop
